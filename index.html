        // Cookie functions (allowed in sandbox)
        function setCookie(name, value, days = 365) {
            const expires = new Date(Date.now() + days * 86400000).toUTCString();
            document.cookie = `${name}=${JSON.stringify(value)}; expires=${expires}; path=/; SameSite=Lax`;
        }
        function getCookie(name) {
            const match = document.cookie.match(new RegExp(`(^| )${name}=([^;]+)`));
            if (match) try { return JSON.parse(decodeURIComponent(match[2])); } catch { return null; }
            return null;
        }

        // Start course
        function startCourse() {
            const name = document.getElementById('nameInput').value.trim();
            if (name) {
                data.userName = name;
                saveData();
                document.getElementById('nameOverlay').style.display = 'none';
                initNav();
                updateUI();
            }
        }

        function findModule(day) {
            for (let mod of modules) if (day >= mod.start && day <= mod.end) return mod;
            return modules[3];
        }

        function getRelativeDay(day) {
            let mod = findModule(day);
            return day - mod.start + 1;
        }

        function getChapter(relDay) {
            return Math.ceil(relDay / 6);
        }

        function isQuizDay(relDay) {
            return relDay % 6 === 0;
        }

        function getLesson(day) {
            let mod = findModule(day);
            let rel = getRelativeDay(day);
            let tpls = templates[mod.id];
            let chap = getChapter(rel);
            if (isQuizDay(rel) && tpls.quizChapters[chap - 1]) {
                return {
                    type: 'quiz',
                    title: `Prova Capítulo ${chap} - ${mod.name}`,
                    questions: tpls.quizChapters[chap - 1],
                    modId: mod.id,
                    chap: chap
                };
            } else {
                let idx = Math.floor((rel - 1) / 6) * 5 + ((rel - 1) % 6) + 1;
                let title = tpls.titles[(idx - 1) % tpls.titles.length];
                let content = tpls.contents[(idx - 1) % tpls.contents.length];
                let exQ = `O que é/ faz ${title.split(' ')[0].toLowerCase()}?`;
                let exOpts = ['Aprendi e entendo! ✅', 'Ainda confuso ❌', 'Quase lá 🤔'];
                return {
                    type: 'lesson',
                    title: `Dia ${day}: ${title}`,
                    content,
                    example: `Exemplo prático: Imagine você no RH/Financeiro/etc ${title.toLowerCase()}. Use isso na vida real! 🎯`,
                    exercise: { type: 'mcq', q: exQ, opts: exOpts, correct: 0 }
                };
            }
